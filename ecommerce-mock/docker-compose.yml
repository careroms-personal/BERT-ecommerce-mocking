version: "3.9"

# ─────────────────────────────────────────────
# Shared logging config — applied to every app service
# App services (not infra) add:
#   logging: *default-logging
#   container_name: <service-name>   ← used as Fluent Bit tag
# ─────────────────────────────────────────────
x-logging: &default-logging
  driver: fluentd
  options:
    fluentd-address: "localhost:24224"
    fluentd-async: "true"     # don't block container if fluent-bit is slow
    tag: "{{.Name}}"          # container_name becomes the JSONL file name

services:

  # ─────────────────────────────────────────────
  # Fluent Bit — log collector
  # Listens on :24224 (forward protocol)
  # Writes ./logs/<service>.jsonl
  # ─────────────────────────────────────────────
  fluent-bit:
    image: fluent/fluent-bit:3.3
    container_name: ecommerce-fluent-bit
    restart: unless-stopped
    ports:
      - "24224:24224"
      - "24224:24224/udp"
      - "2020:2020"       # Fluent Bit HTTP monitoring API
    volumes:
      - ./infra/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./logs:/logs
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:2020/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────────
  # PostgreSQL — api-product, api-customer, api-order
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce_pass
      POSTGRES_DB: product_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce -d product_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─────────────────────────────────────────────
  # MongoDB — api-cart
  # ─────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: ecommerce-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ecommerce
      MONGO_INITDB_ROOT_PASSWORD: ecommerce_pass
      MONGO_INITDB_DATABASE: cart_db
    volumes:
      - mongo_data:/data/db
      - ./infra/mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
    ports:
      - "27017:27017"
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────
  # MySQL — api-payment
  # ─────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: ecommerce-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: payment_db
      MYSQL_USER: ecommerce
      MYSQL_PASSWORD: ecommerce_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "ecommerce", "-pecommerce_pass"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────
  # Elasticsearch — api-search
  # ─────────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: ecommerce-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx1g
      - cluster.name=ecommerce-cluster
      - node.name=es-node-1
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536

# ─────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────
volumes:
  postgres_data:
    name: ecommerce-postgres-data
  mongo_data:
    name: ecommerce-mongo-data
  mysql_data:
    name: ecommerce-mysql-data
  es_data:
    name: ecommerce-es-data

# ─────────────────────────────────────────────
# Network
# ─────────────────────────────────────────────
networks:
  ecommerce-net:
    name: ecommerce-net
    driver: bridge
