# ─────────────────────────────────────────────
# Shared logging config — applied to every app service
# App services (not infra) add:
#   logging: *default-logging
#   container_name: <service-name>   ← used as Fluent Bit tag
# ─────────────────────────────────────────────
x-logging: &default-logging
  driver: fluentd
  options:
    fluentd-address: "localhost:24224"
    fluentd-async: "true"     # don't block container if fluent-bit is slow
    tag: "{{.Name}}"          # container_name becomes the JSONL file name

services:

  # ─────────────────────────────────────────────
  # Fluent Bit — log collector
  # Listens on :24224 (forward protocol)
  # Writes ./logs/<service>.jsonl
  # ─────────────────────────────────────────────
  fluent-bit:
    image: fluent/fluent-bit:3.2
    container_name: ecommerce-fluent-bit
    restart: unless-stopped
    ports:
      - "24224:24224"
      - "24224:24224/udp"
      - "2020:2020"       # Fluent Bit HTTP monitoring API
    volumes:
      - ./infra/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./logs:/logs
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:2020/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────────
  # api-product (Go + Zap + PostgreSQL)
  # ─────────────────────────────────────────────
  api-product:
    build: ./applications/api-product
    container_name: api-product
    restart: unless-stopped
    environment:
      PORT: "8081"
      DATABASE_URL: "postgres://ecommerce:ecommerce_pass@postgres:5432/product_db?sslmode=disable"
    ports:
      - "8081:8081"
    networks:
      - ecommerce-net
    depends_on:
      postgres:
        condition: service_healthy
    logging: *default-logging

  # ─────────────────────────────────────────────
  # api-search (Rust + tracing + Elasticsearch)
  # ─────────────────────────────────────────────
  api-search:
    build: ./applications/api-search
    container_name: api-search
    restart: unless-stopped
    environment:
      PORT: "8086"
      ELASTICSEARCH_URL: "http://elasticsearch:9200"
      RUST_LOG: "info"
    ports:
      - "8086:8086"
    networks:
      - ecommerce-net
    depends_on:
      elasticsearch:
        condition: service_healthy
    logging: *default-logging

  # ─────────────────────────────────────────────
  # api-payment (.NET + Serilog + MySQL)
  # ─────────────────────────────────────────────
  api-payment:
    build: ./applications/api-payment
    container_name: api-payment
    restart: unless-stopped
    environment:
      ASPNETCORE_URLS: "http://+:8085"
      ConnectionStrings__DefaultConnection: "Server=mysql;Port=3306;Database=payment_db;User=ecommerce;Password=ecommerce_pass;"
      Payment__MaxRetries: "3"
      Payment__ProviderTimeoutMs: "4000"
      Payment__SuccessRate: "0.75"
      Payment__DeclineRate: "0.15"
    ports:
      - "8085:8085"
    networks:
      - ecommerce-net
    depends_on:
      mysql:
        condition: service_healthy
    logging: *default-logging

  # ─────────────────────────────────────────────
  # api-order (Go + Zap + PostgreSQL)
  # ─────────────────────────────────────────────
  api-order:
    build: ./applications/api-order
    container_name: api-order
    restart: unless-stopped
    environment:
      PORT: "8084"
      DATABASE_URL: "postgres://ecommerce:ecommerce_pass@postgres:5432/order_db?sslmode=disable"
      CART_SERVICE_URL: "http://api-cart:8083"
      PRODUCT_SERVICE_URL: "http://api-product:8081"
    ports:
      - "8084:8084"
    networks:
      - ecommerce-net
    depends_on:
      postgres:
        condition: service_healthy
      api-cart:
        condition: service_healthy
      api-product:
        condition: service_healthy
    logging: *default-logging

  # ─────────────────────────────────────────────
  # api-cart (Node.js + Pino + MongoDB)
  # ─────────────────────────────────────────────
  api-cart:
    build: ./applications/api-cart
    container_name: api-cart
    restart: unless-stopped
    environment:
      PORT: "8083"
      MONGO_URI: "mongodb://ecommerce:ecommerce_pass@mongodb:27017/cart_db?authSource=cart_db"
      PRODUCT_SERVICE_URL: "http://api-product:8081"
      PRETTY_LOGS: "false"
    ports:
      - "8083:8083"
    networks:
      - ecommerce-net
    depends_on:
      mongodb:
        condition: service_healthy
      api-product:
        condition: service_healthy
    logging: *default-logging

  # ─────────────────────────────────────────────
  # api-customer (.NET + Serilog + PostgreSQL)
  # ─────────────────────────────────────────────
  api-customer:
    build: ./applications/api-customer
    container_name: api-customer
    restart: unless-stopped
    environment:
      ASPNETCORE_URLS: "http://+:8082"
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=customer_db;Username=ecommerce;Password=ecommerce_pass"
      Jwt__Secret: "ecommerce-mock-jwt-secret-change-in-prod-32chars"
      Jwt__AccessTokenExpiryMinutes: "60"
      Jwt__RefreshTokenExpiryDays: "7"
    ports:
      - "8082:8082"
    networks:
      - ecommerce-net
    depends_on:
      postgres:
        condition: service_healthy
    logging: *default-logging

  # ─────────────────────────────────────────────
  # PostgreSQL — api-product, api-customer, api-order
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce_pass
      POSTGRES_DB: product_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce -d product_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─────────────────────────────────────────────
  # MongoDB — api-cart
  # ─────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: ecommerce-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ecommerce
      MONGO_INITDB_ROOT_PASSWORD: ecommerce_pass
      MONGO_INITDB_DATABASE: cart_db
    volumes:
      - mongo_data:/data/db
      - ./infra/mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
    ports:
      - "27017:27017"
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────
  # MySQL — api-payment
  # ─────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: ecommerce-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: payment_db
      MYSQL_USER: ecommerce
      MYSQL_PASSWORD: ecommerce_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "ecommerce", "-pecommerce_pass"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────
  # Elasticsearch — api-search
  # ─────────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: ecommerce-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx1g
      - cluster.name=ecommerce-cluster
      - node.name=es-node-1
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536

# ─────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────
volumes:
  postgres_data:
    name: ecommerce-postgres-data
  mongo_data:
    name: ecommerce-mongo-data
  mysql_data:
    name: ecommerce-mysql-data
  es_data:
    name: ecommerce-es-data

# ─────────────────────────────────────────────
# Network
# ─────────────────────────────────────────────
networks:
  ecommerce-net:
    name: ecommerce-net
    driver: bridge
