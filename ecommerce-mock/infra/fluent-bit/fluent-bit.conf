# ─────────────────────────────────────────────────────────────────────────────
# Fluent Bit — ecommerce-mock log collector
#
# Flow:
#   app container stdout
#     → Docker fluentd log driver (tag = container_name)
#     → [INPUT] forward :24224
#     → [FILTER] parse JSON log body
#     → [OUTPUT] file per service → ./logs/<service>.jsonl
# ─────────────────────────────────────────────────────────────────────────────

[SERVICE]
    Flush           1
    Log_Level       info
    Daemon          off
    Parsers_File    /fluent-bit/etc/parsers.conf
    # HTTP monitoring API — accessible at :2020/api/v1/metrics
    HTTP_Server     On
    HTTP_Listen     0.0.0.0
    HTTP_Port       2020

# ─────────────────────────────────────────────
# INPUT — Docker fluentd log driver forward
# ─────────────────────────────────────────────
[INPUT]
    Name              forward
    Listen            0.0.0.0
    Port              24224
    Buffer_Chunk_Size 1M
    Buffer_Max_Size   6M

# ─────────────────────────────────────────────
# FILTER — parse the "log" field as JSON
# Services emit JSON logs; Docker wraps them in {"log": "<raw>", ...}
# After this filter, all JSON fields are promoted to top-level record fields
# ─────────────────────────────────────────────
[FILTER]
    Name            parser
    Match           *
    Key_Name        log
    Parser          json
    Reserve_Data    On
    Preserve_Key    Off

# ─────────────────────────────────────────────
# OUTPUT — one JSONL file per service
# Tag = container_name set by docker-compose x-logging anchor
# ─────────────────────────────────────────────
[OUTPUT]
    Name    file
    Match   api-gateway
    Path    /logs
    File    api-gateway.jsonl
    Format  json_lines

[OUTPUT]
    Name    file
    Match   api-product
    Path    /logs
    File    api-product.jsonl
    Format  json_lines

[OUTPUT]
    Name    file
    Match   api-cart
    Path    /logs
    File    api-cart.jsonl
    Format  json_lines

[OUTPUT]
    Name    file
    Match   api-customer
    Path    /logs
    File    api-customer.jsonl
    Format  json_lines

[OUTPUT]
    Name    file
    Match   api-order
    Path    /logs
    File    api-order.jsonl
    Format  json_lines

[OUTPUT]
    Name    file
    Match   api-payment
    Path    /logs
    File    api-payment.jsonl
    Format  json_lines

[OUTPUT]
    Name    file
    Match   api-search
    Path    /logs
    File    api-search.jsonl
    Format  json_lines

[OUTPUT]
    Name    file
    Match   search-data-transfer
    Path    /logs
    File    search-data-transfer.jsonl
    Format  json_lines

# ─────────────────────────────────────────────
# OUTPUT — catch-all: unmatched tags go to stdout
# Useful for debugging infra containers or load-generator logs
# ─────────────────────────────────────────────
[OUTPUT]
    Name    stdout
    Match   *
    Format  json_lines
