# ─────────────────────────────────────────────────────────────────────────────
# Fluent Bit — ecommerce-mock log collector
#
# Flow:
#   app container stdout
#     → Docker fluentd log driver (tag = container_name)
#     → [INPUT] forward :24224
#     → [OUTPUT] file per service → ./logs/<service>.jsonl
# ─────────────────────────────────────────────────────────────────────────────

[SERVICE]
    Flush           1
    Log_Level       info
    Daemon          off
    # HTTP monitoring API — accessible at :2020/api/v1/metrics
    HTTP_Server     On
    HTTP_Listen     0.0.0.0
    HTTP_Port       2020

# ─────────────────────────────────────────────
# INPUT — Docker fluentd log driver forward
# ─────────────────────────────────────────────
[INPUT]
    Name              forward
    Listen            0.0.0.0
    Port              24224
    Buffer_Chunk_Size 1M
    Buffer_Max_Size   6M

# ─────────────────────────────────────────────
# OUTPUT — one file per service
# Each line: [unix_timestamp, {record_fields}]
# Tag = container_name set by docker-compose x-logging anchor
# ─────────────────────────────────────────────
[OUTPUT]
    Name    file
    Match   api-gateway
    Path    /logs
    File    api-gateway.jsonl

[OUTPUT]
    Name    file
    Match   api-product
    Path    /logs
    File    api-product.jsonl

[OUTPUT]
    Name    file
    Match   api-cart
    Path    /logs
    File    api-cart.jsonl

[OUTPUT]
    Name    file
    Match   api-customer
    Path    /logs
    File    api-customer.jsonl

[OUTPUT]
    Name    file
    Match   api-order
    Path    /logs
    File    api-order.jsonl

[OUTPUT]
    Name    file
    Match   api-payment
    Path    /logs
    File    api-payment.jsonl

[OUTPUT]
    Name    file
    Match   api-search
    Path    /logs
    File    api-search.jsonl

[OUTPUT]
    Name    file
    Match   search-data-transfer
    Path    /logs
    File    search-data-transfer.jsonl

# ─────────────────────────────────────────────
# OUTPUT — catch-all: unmatched tags go to stdout
# ─────────────────────────────────────────────
[OUTPUT]
    Name    stdout
    Match   *
